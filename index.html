<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Body Wanted</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
      color: #ffffff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 2vh 2vw;
      overflow: hidden;
      touch-action: none;
    }

    /* Background */
    #bg-layer {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
      z-index: 0;
      transition: all 0.5s ease;
      filter: brightness(1);
    }

    #bg-layer.distorted {
      background: linear-gradient(135deg, #330000 0%, #660000 50%, #330000 100%);
      filter: brightness(0.8) saturate(1.5);
      animation: bg-glitch 0.2s infinite;
    }

    @keyframes bg-glitch {
      0%, 100% { filter: brightness(0.8) saturate(1.5) hue-rotate(0deg); }
      50% { filter: brightness(0.6) saturate(2) hue-rotate(10deg); }
    }

    /* Score Display */
    #score-board {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: 1vh;
    }

    .score-label {
      font-size: clamp(10px, 2vw, 16px);
      letter-spacing: 2px;
      color: #aaa;
      margin-bottom: 0.5vh;
    }

    #score-num {
      font-size: clamp(40px, 10vw, 80px);
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      letter-spacing: 3px;
    }

    /* Play Area */
    #play-field {
      position: relative;
      width: 100%;
      height: 70vh;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 5;
      touch-action: none;
    }

    /* Block Track - Top area where block moves */
    .block-track {
      position: relative;
      width: 100%;
      height: 15vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 1rem;
      padding: 1vh;
      touch-action: none;
    }

    /* Player Block - The Box */
    #player-block {
      position: absolute;
      background: linear-gradient(135deg, #ffffff 0%, #e8e8e8 50%, #ffffff 100%);
      border-radius: 1rem;
      box-shadow: 0 0 2vw rgba(255, 255, 255, 0.9), inset 0 0 1vw rgba(255, 255, 255, 0.4);
      transition: none;
      cursor: grab;
      will-change: left, width, height;
      min-width: 50px;
      min-height: 50px;
    }

    #player-block.pulse {
      animation: block-pulse 0.4s ease-out;
    }

    @keyframes block-pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 2vw rgba(255, 255, 255, 0.9), inset 0 0 1vw rgba(255, 255, 255, 0.4);
      }
      100% {
        transform: scale(1.1);
        box-shadow: 0 0 4vw rgba(0, 255, 100, 1), inset 0 0 2vw rgba(0, 255, 100, 0.5);
      }
    }

    /* Voids Container */
    #voids-container {
      position: relative;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2vh;
      gap: 2vw;
    }

    /* Void Vessel */
    .void-vessel {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    /* Void Background - The Dark Circle */
    .void-body {
      position: relative;
      background: radial-gradient(ellipse at center 30%, rgba(20, 20, 40, 0.95) 0%, rgba(10, 10, 20, 0.98) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 3vw rgba(0, 0, 0, 0.95), 0 0 2vw rgba(100, 100, 150, 0.3);
      transition: all 0.3s ease;
      width: 100%;
      height: 100%;
    }

    .void-vessel.breathing .void-body {
      animation: void-breathe 2.5s ease-in-out infinite;
    }

    .void-body.angry-distorted {
      background: radial-gradient(ellipse at center 30%, rgba(80, 20, 20, 0.95) 0%, rgba(40, 10, 10, 0.98) 100%);
      box-shadow: inset 0 0 3vw rgba(255, 0, 0, 0.5), 0 0 2vw rgba(255, 0, 0, 0.4);
      animation: void-distort 0.15s infinite;
    }

    @keyframes void-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes void-distort {
      0%, 100% { transform: scale(1) skewX(0deg) skewY(0deg); }
      25% { transform: scale(1.05) skewX(-2deg) skewY(2deg); }
      50% { transform: scale(0.98) skewX(2deg) skewY(-2deg); }
      75% { transform: scale(1.03) skewX(-1deg) skewY(-1deg); }
    }

    /* Chibi Face */
    .chibi-face {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* Simple Cute Smiley Face */
    .face-container {
      position: relative;
      width: 60%;
      height: 60%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Eyes - Simple Dots */
    .eyes {
      position: absolute;
      top: 20%;
      display: flex;
      gap: 2vw;
      width: 100%;
      justify-content: center;
    }

    .eye-dot {
      width: 1.5vw;
      height: 1.5vw;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 0.5vw rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
      min-width: 12px;
      min-height: 12px;
    }

    .eye-dot.scared {
      width: 2vw;
      height: 2vw;
      background: #ff0000;
      box-shadow: 0 0 1vw rgba(255, 0, 0, 0.8);
      min-width: 16px;
      min-height: 16px;
    }

    /* Mouth - Smile */
    .mouth-smile {
      position: absolute;
      bottom: 15%;
      width: 4vw;
      height: 2vw;
      border: 0.3vw solid #ffffff;
      border-top: none;
      border-radius: 0 0 4vw 4vw;
      transition: all 0.3s ease;
      min-width: 30px;
      min-height: 15px;
    }

    .mouth-smile.worried {
      width: 3vw;
      height: 0.3vw;
      border: none;
      border-top: 0.3vw solid #000;
      border-radius: 0;
      min-width: 20px;
      min-height: 2px;
    }

    .mouth-smile.angry {
      width: 5vw;
      height: 0.4vw;
      border: none;
      border-top: 0.4vw solid #ff3b3b;
      border-radius: 0;
      transform: rotate(20deg);
      min-width: 35px;
      min-height: 2px;
    }

    .mouth-smile.distorted {
      width: 6vw;
      height: 4vw;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.9);
      box-shadow: inset 0 0 1vw rgba(255, 0, 0, 0.5);
      animation: mouth-twitch 0.1s infinite;
      min-width: 40px;
      min-height: 28px;
    }

    @keyframes mouth-twitch {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.8); }
    }

    /* Speech Bubble */
    .speech-bubble {
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 40, 0.95);
      border: 1px solid #333;
      border-radius: 0.8vw;
      padding: 0.5vw 1vw;
      font-size: clamp(8px, 1.5vw, 14px);
      white-space: nowrap;
      color: #aaa;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 3;
    }

    .speech-bubble.visible {
      opacity: 1;
    }

    /* Jumpscare Overlay */
    #jumpscare-overlay {
      position: fixed;
      inset: 0;
      background: #000000;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #jumpscare-overlay.active {
      display: flex;
    }

    #jumpscare-overlay.shake {
      animation: screen-shake 0.08s infinite;
    }

    @keyframes screen-shake {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-2vw, -2vw); }
      50% { transform: translate(2vw, 2vw); }
      75% { transform: translate(-1.5vw, 1.5vw); }
    }

    .monster-face {
      width: clamp(200px, 50vw, 400px);
      height: clamp(200px, 50vw, 400px);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: monster-grow 0.5s ease-out;
    }

    @keyframes monster-grow {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .monster-eye {
      width: clamp(80px, 15vw, 150px);
      height: clamp(80px, 15vw, 150px);
      background: radial-gradient(circle at 35% 35%, #ff3333 0%, #cc0000 100%);
      border-radius: 50%;
      position: relative;
      margin-bottom: 2vh;
      box-shadow: 0 0 3vw rgba(255, 50, 50, 0.9);
      animation: monster-twitch 0.1s infinite;
    }

    .monster-pupil {
      width: 50%;
      height: 50%;
      background: #000;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes monster-twitch {
      0%, 100% { transform: translateX(0) scaleX(1.1); }
      50% { transform: translateX(2vw) scaleX(1); }
    }

    .monster-mouth {
      width: clamp(150px, 30vw, 250px);
      height: clamp(60px, 12vw, 120px);
      background: radial-gradient(circle at center 20%, #000 0%, #330000 100%);
      border: 0.5vw solid #660000;
      border-radius: 50%;
      position: relative;
      box-shadow: inset 0 0 3vw rgba(0, 0, 0, 0.95);
      animation: monster-yawn 0.3s ease-out;
    }

    @keyframes monster-yawn {
      0% { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }

    /* Guide Text */
    #guide {
      position: relative;
      z-index: 10;
      font-size: clamp(10px, 2vw, 14px);
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 1vh;
      text-align: center;
      transition: opacity 0.3s ease;
    }

    /* State Classes */
    .twitching {
      animation: twitch 0.08s infinite;
    }

    @keyframes twitch {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-0.3vw, -0.3vw); }
      50% { transform: translate(0.3vw, 0.3vw); }
      75% { transform: translate(-0.2vw, 0.2vw); }
    }

    .glitch {
      animation: glitch-effect 0.3s ease-out;
    }

    @keyframes glitch-effect {
      0% { opacity: 0; transform: translateX(-1vw); }
      50% { opacity: 0.5; }
      100% { opacity: 0; transform: translateX(1vw); }
    }

    /* Terminal View */
    #terminal-view {
      position: fixed;
      inset: 0;
      background: #000000;
      z-index: 2000;
      display: none;
      padding: 4vh;
      font-size: clamp(12px, 2vw, 16px);
      color: #00ff00;
      overflow: hidden;
    }

    #terminal-view.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #typewriter {
      letter-spacing: 0.2vw;
      font-weight: bold;
    }

    .cursor {
      display: inline-block;
      width: 0.2vw;
      height: 2vw;
      background: #00ff00;
      margin-left: 0.4vw;
      animation: cursor-blink 1s step-end infinite;
    }

    @keyframes cursor-blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="bg-layer"></div>

  <div id="game-container">
    <div id="score-board">
      <div class="score-label">SCORE</div>
      <div id="score-num">0</div>
    </div>

    <div id="play-field">
      <div class="block-track">
        <div id="player-block"></div>
      </div>
      <div id="voids-container"></div>
    </div>

    <div id="guide">[ TAP TO STOP & GROW - RELEASE TO DROP ]</div>
  </div>

  <div id="jumpscare-overlay">
    <div class="monster-face">
      <div class="monster-eye">
        <div class="monster-pupil"></div>
      </div>
      <div class="monster-mouth"></div>
    </div>
  </div>

  <div id="terminal-view">
    <div id="typewriter"></div><span class="cursor"></span>
  </div>

  <script>
    // Responsive game configuration
    const getGameConfig = () => {
      return {
        GAME_WIDTH: window.innerWidth * 0.95,
        GAME_HEIGHT: window.innerHeight * 0.70,
        BLOCK_WIDTH_INITIAL: Math.max(60, window.innerWidth * 0.10),
        BLOCK_HEIGHT_INITIAL: Math.max(50, window.innerHeight * 0.06),
        VOID_SIZE_MIN: Math.max(120, Math.min(window.innerWidth, window.innerHeight) * 0.15),
        PERFECT_FIT_TOLERANCE: 30,
        BLOCK_SPEED: 0.08 // pixels per frame
      };
    };

    let config = getGameConfig();

    const PHASES = {
      INCUBATION: { min: 0, max: 4, voids: 1 },
      ROOMMATES: { min: 5, max: 9, voids: 2 },
      CONSUMPTION: { min: 10, max: 14, voids: 4 },
      SYNTHESIS: { min: 15, max: Infinity, voids: 1 }
    };

    // DOM Elements
    const gameContainer = document.getElementById('game-container');
    const playField = document.getElementById('play-field');
    const playerBlock = document.getElementById('player-block');
    const voidsContainer = document.getElementById('voids-container');
    const scoreNum = document.getElementById('score-num');
    const bgLayer = document.getElementById('bg-layer');
    const guide = document.getElementById('guide');
    const jumpscareOverlay = document.getElementById('jumpscare-overlay');
    const blockTrack = document.querySelector('.block-track');

    // Game State
    let score = 0;
    let consecutiveMisses = 0;
    let gameActive = true;
    let isHolding = false;
    let blockWidth = config.BLOCK_WIDTH_INITIAL;
    let blockHeight = config.BLOCK_HEIGHT_INITIAL;
    let blockX = (config.GAME_WIDTH - blockWidth) / 2;
    let blockDirection = 1; // 1 for right, -1 for left
    let gamePhase = 'INCUBATION';

    let voids = [];
    let nextVoidId = 0;
    let dialogInterval = null;

    const dialogues = [
      "Stop squishing me!",
      "I want the next block!",
      "Your eyes are too big!",
      "This hurts!",
      "Get away from me!",
      "Not again...",
      "Mine!",
      "Please..."
    ];

    function init() {
      score = 0;
      consecutiveMisses = 0;
      gameActive = true;
      gamePhase = 'INCUBATION';
      voids = [];
      nextVoidId = 0;
      blockWidth = config.BLOCK_WIDTH_INITIAL;
      blockHeight = config.BLOCK_HEIGHT_INITIAL;
      blockX = (config.GAME_WIDTH - blockWidth) / 2;
      blockDirection = 1;
      playerBlock.style.width = blockWidth + 'px';
      playerBlock.style.height = blockHeight + 'px';
      playerBlock.style.left = blockX + 'px';
      scoreNum.textContent = '0';
      bgLayer.classList.remove('distorted');
      guide.style.opacity = '1';

      createVoidsForPhase();
      startGameLoop();
    }

    function createVoidsForPhase() {
      voidsContainer.innerHTML = '';
      voids = [];

      if (gamePhase === 'INCUBATION') {
        createVoid(nextVoidId++);
      } else if (gamePhase === 'ROOMMATES') {
        createVoid(nextVoidId++);
        createVoid(nextVoidId++);
        startDialogues();
      } else if (gamePhase === 'CONSUMPTION') {
        for (let i = 0; i < 4; i++) {
          createVoid(nextVoidId++);
        }
        bgLayer.classList.add('distorted');
      } else if (gamePhase === 'SYNTHESIS') {
        createVoid(nextVoidId++);
        bgLayer.classList.remove('distorted');
      }
    }

    function createVoid(id) {
      const void_obj = {
        id: id,
        size: config.VOID_SIZE_MIN,
        state: 'happy',
        element: null,
        voidBody: null,
        chibiElement: null,
        missCount: 0
      };

      const vesselHTML = `
        <div class="void-body">
          <div class="chibi-face">
            <div class="face-container">
              <div class="eyes">
                <div class="eye-dot"></div>
                <div class="eye-dot"></div>
              </div>
              <div class="mouth-smile"></div>
            </div>
          </div>
        </div>
        <div class="speech-bubble"></div>
      `;

      const vesselEl = document.createElement('div');
      vesselEl.className = 'void-vessel breathing';
      vesselEl.innerHTML = vesselHTML;
      vesselEl.style.width = void_obj.size + 'px';
      vesselEl.style.height = void_obj.size + 'px';

      voidsContainer.appendChild(vesselEl);

      void_obj.element = vesselEl;
      void_obj.voidBody = vesselEl.querySelector('.void-body');
      void_obj.chibiElement = vesselEl.querySelector('.chibi-face');

      voids.push(void_obj);
      return void_obj;
    }

    function startGameLoop() {
      const gameLoop = () => {
        if (!gameActive) return;

        // Move block side to side if not holding
        if (!isHolding) {
          moveBlockSideToSide();
        } else {
          // Grow block while holding
          growBlock();
        }

        // Check for perfect fit when block would drop
        if (!isHolding && checkIfBlockShouldDrop()) {
          checkBlockDrop();
        }

        requestAnimationFrame(gameLoop);
      };
      gameLoop();
    }

    function moveBlockSideToSide() {
      blockX += blockDirection * config.BLOCK_SPEED;

      // Bounce off edges
      if (blockX <= 0 || blockX + blockWidth >= config.GAME_WIDTH) {
        blockDirection *= -1;
      }

      blockX = Math.max(0, Math.min(blockX, config.GAME_WIDTH - blockWidth));
      updateBlockPosition();
    }

    function growBlock() {
      // Grow slowly while holding
      blockWidth += 0.5;
      blockHeight += 0.4;
      
      // Limit maximum size
      blockWidth = Math.min(blockWidth, config.GAME_WIDTH * 0.9);
      blockHeight = Math.min(blockHeight, config.GAME_HEIGHT * 0.15);

      playerBlock.style.width = blockWidth + 'px';
      playerBlock.style.height = blockHeight + 'px';
      
      // Keep centered horizontally
      blockX = (config.GAME_WIDTH - blockWidth) / 2;
      updateBlockPosition();
    }

    function updateBlockPosition() {
      playerBlock.style.left = blockX + 'px';
    }

    function checkIfBlockShouldDrop() {
      // Simulate drop - just check on every few frames
      return Math.random() < 0.05;
    }

    function checkBlockDrop() {
      voids.forEach(void_obj => {
        const fitWidth = Math.abs(blockWidth - void_obj.size);

        if (fitWidth < config.PERFECT_FIT_TOLERANCE) {
          handlePerfectFit(void_obj);
        } else if (fitWidth < config.PERFECT_FIT_TOLERANCE * 2) {
          handleMiss(void_obj);
        }
      });
    }

    function handlePerfectFit(void_obj) {
      score++;
      consecutiveMisses = 0;
      scoreNum.textContent = score;

      playerBlock.classList.add('pulse');

      checkPhaseProgression();
      setTimeout(() => resetForNextTurn(), 600);
    }

    function handleMiss(void_obj) {
      consecutiveMisses++;

      if (consecutiveMisses === 1) {
        setVoidState(void_obj, 'worried');
      } else if (consecutiveMisses === 2) {
        setVoidState(void_obj, 'angry');
      } else if (consecutiveMisses >= 3) {
        triggerJumpscare();
      }
    }

    function setVoidState(void_obj, state) {
      void_obj.state = state;
      const chibi = void_obj.chibiElement;
      const mouth = chibi.querySelector('.mouth-smile');
      const eyeDots = chibi.querySelectorAll('.eye-dot');
      const voidBody = void_obj.voidBody;

      if (state === 'worried') {
        mouth.className = 'mouth-smile worried';
      } else if (state === 'angry') {
        mouth.className = 'mouth-smile angry';
        eyeDots.forEach(eye => {
          eye.classList.add('scared');
        });
        void_obj.element.classList.add('twitching');
        voidBody.classList.add('angry-distorted');
      }
    }

    function triggerJumpscare() {
      gameActive = false;
      jumpscareOverlay.classList.add('active', 'shake');
      guide.style.opacity = '0';

      setTimeout(() => {
        jumpscareOverlay.classList.remove('active', 'shake');
        gameActive = true;
        consecutiveMisses = 0;
        score = Math.max(0, score - 1);
        scoreNum.textContent = score;

        if (score >= 10) {
          gamePhase = 'CONSUMPTION';
        } else if (score >= 5) {
          gamePhase = 'ROOMMATES';
        } else {
          gamePhase = 'INCUBATION';
        }

        createVoidsForPhase();
        guide.style.opacity = '1';
      }, 1500);
    }

    function checkPhaseProgression() {
      if (score === 5) {
        gamePhase = 'ROOMMATES';
        createVoidsForPhase();
      } else if (score === 10) {
        gamePhase = 'CONSUMPTION';
        createVoidsForPhase();
      } else if (score === 15) {
        gamePhase = 'SYNTHESIS';
        endGame();
      }
    }

    function resetForNextTurn() {
      if (gamePhase === 'SYNTHESIS') return;

      playerBlock.classList.remove('pulse');
      blockWidth = config.BLOCK_WIDTH_INITIAL;
      blockHeight = config.BLOCK_HEIGHT_INITIAL;
      blockX = (config.GAME_WIDTH - blockWidth) / 2;
      blockDirection = Math.random() > 0.5 ? 1 : -1;
      playerBlock.style.width = blockWidth + 'px';
      playerBlock.style.height = blockHeight + 'px';
      playerBlock.style.left = blockX + 'px';

      if (gamePhase === 'INCUBATION' || gamePhase === 'ROOMMATES') {
        voids.forEach(v => {
          v.state = 'happy';
          v.missCount = 0;
          resetChibiFace(v);
          v.element.style.animation = 'void-breathe 2.5s ease-in-out infinite';
        });
      }
    }

    function resetChibiFace(void_obj) {
      const chibi = void_obj.chibiElement;
      const mouth = chibi.querySelector('.mouth-smile');
      const eyeDots = chibi.querySelectorAll('.eye-dot');
      const voidBody = void_obj.voidBody;

      mouth.className = 'mouth-smile';
      eyeDots.forEach(eye => {
        eye.classList.remove('scared');
      });
      void_obj.element.classList.remove('twitching');
      voidBody.classList.remove('angry-distorted');
    }

    function startDialogues() {
      if (dialogInterval) clearInterval(dialogInterval);
      dialogInterval = setInterval(() => {
        if (voids.length > 0) {
          const randomVoid = voids[Math.floor(Math.random() * voids.length)];
          const randomDialog = dialogues[Math.floor(Math.random() * dialogues.length)];
          const speechBubble = randomVoid.element.querySelector('.speech-bubble');
          speechBubble.textContent = randomDialog;
          speechBubble.classList.add('visible');
          setTimeout(() => {
            speechBubble.classList.remove('visible');
          }, 3000);
        }
      }, 4000);
    }

    function endGame() {
      gameActive = false;
      guide.style.opacity = '0';
      setTimeout(() => {
        typeMessage('Thank you for the body.', () => {
          setTimeout(() => {
            transitionToTerminal();
          }, 2000);
        });
      }, 500);
    }

    function typeMessage(message, callback) {
      const typewriter = document.getElementById('typewriter');
      typewriter.innerHTML = '';
      let charIndex = 0;
      const typeInterval = setInterval(() => {
        if (charIndex < message.length) {
          typewriter.textContent += message[charIndex];
          charIndex++;
        } else {
          clearInterval(typeInterval);
          if (callback) callback();
        }
      }, 80);
    }

    function transitionToTerminal() {
      gameContainer.style.opacity = '0';
      gameContainer.style.transition = 'opacity 0.8s ease-out';
      setTimeout(() => {
        gameContainer.style.display = 'none';
        document.getElementById('terminal-view').classList.add('active');
      }, 800);
    }

    // Input Handling
    blockTrack.addEventListener('pointerdown', (e) => {
      if (!gameActive) return;
      isHolding = true;
      e.preventDefault();
    });

    document.addEventListener('pointerup', (e) => {
      isHolding = false;
    });

    document.addEventListener('pointercancel', (e) => {
      isHolding = false;
    });

    init();
  </script>
</body>
</html>
